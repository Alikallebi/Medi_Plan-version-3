name: staff_app
description: MediPlan mobile application for staff, managers and super admin users
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  riverpod: ^2.3.6
  flutter_riverpod: ^2.6.1
  http: ^1.1.0
  dio: ^5.3.2
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  go_router: ^10.1.2
  google_fonts: ^6.3.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  intl: 0.20.2
  cached_network_image: ^3.3.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.7
  flutter_screenutil: ^5.9.0
  flutter_localizations:
    sdk: flutter
  lottie: ^2.7.0
  flutter_staggered_animations: ^1.1.1
  pull_to_refresh: ^2.0.0
  fluttertoast: ^8.2.4
  url_launcher: ^6.1.14
  package_info_plus: ^4.1.0
  connectivity_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
